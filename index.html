<!DOCTYPE html>
<html>

<head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" href="favicon.png" type="image.png" />
	<meta http-equiv="Cache-Control" content="no-cache">
	<meta http-equiv="Pragma" content="no-cache">
	<title></title>
	<meta charset="UTF-8"/>
	<script defer src="alpine-3.15.12.min.js"></script>
	<style>
		body {
			background: black;
			color: white;
			font-family: sans-serif;
			height: 100%;
			margin: 0;
			padding: 0;
			width: 100%;
                }
		a, a:visited, a:hover, a:active {
			color: inherit;
			text-decoration: none;
			outline: none;
		}
		.loading {
			align-items: center;
			display: flex;
			justify-content: center;
			color: white;
		}
		.error {
			display: flex;
			background-color: lightred;
			color: red;
			justify-content: center;
		}
		.header {
			display: flex;
			flex-direction: row;
			justify-content: center;
		}
		.group {
		}
		.group-title {
			align-items: center;
			display: flex;
			flex-direction: row;
			justify-content: center;
		}
		.group-title > img {
			width: 1em;
			height: 1em;
			margin-left: 1em;
		}
		.group-content {
			display: flex;
			flex-direction: row;
			flex-wrap: wrap;
			gap: 1em;
			justify-content: center;
			margin-left: 1em;
			margin-right: 1em;
		}
		.item {
			float: left;
			width: 7em;
			height: 8em;
			background: lightgray;
			color: black;
			padding: 1em;
			text-align: center;
			border-radius: 2em;
			box-shadow: 0.2em 0.2em gray;
		}
		.item > a {
			align-items: center;
			display: flex;
			flex-direction: column;
			gap: 0.1em;
		}
		.item > a > img {
			height: 5em;
			width: 5em;
		}
		.item > a > span {
			height: 2em;
			align-content: center;
		}
		.runner {
			max-width: 40em;
			max-height: 40em;
			background: black;
			color: white;
			border-radius: 1em;
			overflow: hidden;
			border: 2px solid gray;
		}
	</style>
	<script><!-- dynamic site style -->
		const link = document.createElement('link');
		link.rel = 'stylesheet';
		link.href = 'site.css?ts=' + Date.now();
		document.head.appendChild(link);
	</script>
</head>

<body>

<div x-data="siteManager()" x-init="loadSite()">
	<!-- loading banner -->
	<div x-show="loading" class="loading">
	    <img src="loading.png">
	    <p>loading...</p>
	</div>
	<!-- error message banner -->
	<div x-show="error" class="error">
	    <span x-text="error"></span>
	</div>
	<!-- header -->
	<div x-show="!loading && !error && header" class="header">
		<img :src="header?.img">
		<h1 x-text="header?.text"></h1>
	</div>
	<!-- content -->
	<template x-for="(group, g_idx) in content" :key="g_idx">
		<!-- group of boxes -->
		<div class="group">
			<!-- group title -->
			<div x-show="group.title" 
			     class="group-title"
			     @click="group.folded = !group.folded">
				<h2 x-text="group.title"></h2>
				<img x-show="group.foldable" :src="group?.folded ? 'unfold.png' : 'fold.png'">
			</div>
			<!-- items in the group -->
			<div class="group-content"
			     x-show="!group.folded">
				<template x-for="(item, i_idx) in group.content" :key="g_idx*1000+i_idx">
					<div class="item"
					     :class="[ item.style ? item.style : '', item.run ? 'runner' : '' ]">
						<a :href="item.link ? item.link : 'javascript:void(0)'"
						   :target="item.new_page ? '_blank' : '_self'">
							<img x-show="item.img" :src="item.img">
							<div x-show="item.run" x-init="item.run ? runner($el,item):null">
								<img src="wait.png">
							</div>
							<span x-show="item.text" x-text="item.text"></span>
						</a>
					</div>
				</template>
			</div>
		</div>
	</template>
	<!-- footer -->
	<div x-show="!loading && !error && footer" class="footer">
		<a :href="footer?.link ? footer.link : 'javascript:void(0)'" target="_blank">
			<span x-show="footer?.text" x-text="footer?.text"></span>
		</a>
	</div>

</div> <!-- end of the fun -->

<script>
document.addEventListener('alpine:init', () => {
	Alpine.data('siteManager', () => ({
		loading: true,
		error: null,
		header: null,
		content: [],
		footer: null,

		runner(el, item) {
				setTimeout(async ()=>{ 
					const response = await fetch( item.run );
					el.innerHTML = await response.text();
					this.runner(el, item);
				}, (item.interval ? item.interval:10) * 1000 );
		},

		async loadSite() {
		try{
			const response = await fetch( "site.json" );
                	const data = await response.json();
			if ( data.title )
				document.title = data.title;
			if ( data.header )
				this.header = data.header;
			if ( data.footer )
				this.footer = data.footer;
			this.content = data.content;
		} catch(e) {
			console.error('Failed to fetch site.json', e);
			this.error = "Loading failed: " + e;
		} finally {
			this.loading = false;
		}} // load site.json logic


	}));
});
</script>

</body>
</html>
